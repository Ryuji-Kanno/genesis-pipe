<!DOCTYPE html>
<html>
  <head>
    <base target="_top">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Genesis Pipe (External)</title>
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <style>
      body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; background-color: #f2f2f7; margin: 0; display: flex; flex-direction: column; height: 100vh; }
      .header { background: #fff; padding: 12px 16px; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 1px 2px rgba(0,0,0,0.1); z-index: 10; }
      .title { font-weight: 700; color: #2196F3; display: flex; align-items: center; gap: 5px; }
      #chat-area { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 12px; }
      .bubble { max-width: 85%; padding: 10px 14px; border-radius: 18px; font-size: 15px; line-height: 1.4; word-wrap: break-word; }
      .bubble.user   { align-self: flex-end;   background: #2196F3; color: white; border-bottom-right-radius: 4px; }
      .bubble.titan  { align-self: flex-start; background: #fff; color: #333; border-bottom-left-radius: 4px; box-shadow: 0 1px 2px rgba(0,0,0,0.1); }
      .bubble.system { align-self: center; background: rgba(0,0,0,0.05); color: #666; font-size: 12px; padding: 4px 10px; border-radius: 10px; margin: 5px 0; }
      .footer { background: #fff; padding: 10px; border-top: 1px solid #e0e0e0; display: flex; flex-direction: column; gap: 8px; }
      #save-btn { width: 100%; padding: 10px; background: #FF9500; color: white; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; display: flex; justify-content: center; align-items: center; gap: 5px; }
      .input-row { display: flex; gap: 8px; align-items: flex-end; }
      #text-input { flex: 1; padding: 12px; border-radius: 20px; border: 1px solid #ddd; background: #f9f9f9; font-size: 16px; line-height: 1.4; max-height: 100px; resize: none; outline: none; }
      .icon-btn { width: 44px; height: 44px; border-radius: 50%; border: none; display: flex; justify-content: center; align-items: center; cursor: pointer; transition: 0.2s; flex-shrink: 0; }
      #send-btn { background: #2196F3; color: white; }
      #mic-btn { background: #e9e9eb; color: #2196F3; }
      #mic-btn.recording { background: #ff3b30; color: white; animation: pulse 1.5s infinite; }
      @keyframes pulse { 0% {box-shadow: 0 0 0 0 rgba(255,59,48,0.4);} 70% {box-shadow: 0 0 0 10px rgba(255,59,48,0);} 100% {box-shadow: 0 0 0 0 rgba(255,59,48,0);} }
    </style>
  </head>
  <body>
    <div class="header">
      <div class="title"><span class="material-icons" style="color: #2196F3;">flight</span> Genesis Pipe (External)</div>
    </div>

    <div id="chat-area">
      <div class="bubble titan">【準備完了】<br>思考を連ねてください。保存ボタンで全ログを記録します。</div>
    </div>

    <div class="footer">
      <button id="save-btn" onclick="saveConversation()"><span class="material-icons">save</span> 会話ログを保存して終了</button>
      <div class="input-row">
        <button id="mic-btn" class="icon-btn" onclick="toggleRecording()"><span class="material-icons">mic</span></button>
        <textarea id="text-input" rows="1" placeholder="入力..."></textarea>
        <button id="send-btn" class="icon-btn" onclick="handleSend()"><span class="material-icons">send</span></button>
      </div>
    </div>

    <script>
      const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbxDEb1rJ87VNSQk8U_o8JzjUr8yKtp2zw8C8p3XxLOFBMqczKn7ulBu-XbTQzLuY7Jo/exec";
      const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
      const recognition = new SpeechRecognition();
      recognition.lang = 'ja-JP'; recognition.continuous = true;
      let isRecording = false; let conversationHistory = "";
      
      const textInput = document.getElementById('text-input');
      const micBtn    = document.getElementById('mic-btn');

      function toggleRecording() { if (!isRecording) { recognition.start(); } else { recognition.stop(); } }
      recognition.onstart = () => { isRecording = true; micBtn.classList.add('recording'); };
      recognition.onend = () => { isRecording = false; micBtn.classList.remove('recording'); };
      recognition.onresult = (e) => {
        for (let i = e.resultIndex; i < e.results.length; ++i) {
          if (e.results[i].isFinal) textInput.value += (textInput.value ? "\n" : "") + e.results[i][0].transcript;
        }
      };

      function handleSend() {
        const text = textInput.value.trim();
        if (!text) return;
        addBubble(text, 'user');
        textInput.value = "";
        conversationHistory += `[Rikki]: ${text}\n`;
        
        // AI対話モード（会話中なので、ここでは即時GAS送信せず、ローカルで処理して後でまとめて送る）
        const loadingId = addLoading();
        fetch(WEB_APP_URL, {
          method: "POST",
          body: JSON.stringify({ type: "ai_chat", fullText: text, history: conversationHistory })
        })
        .then(r => r.json())
        .then(data => {
          removeLoading(loadingId);
          addBubble(data.reply, 'titan');
          conversationHistory += `[Titan]: ${data.reply}\n`;
        });
      }

      function saveConversation() {
        if (!conversationHistory) return;
        addBubble("💾 全会話をスプレッドシートへ同期中...", 'system');
        fetch(WEB_APP_URL, {
          method: "POST",
          body: JSON.stringify({ type: "save", fullText: conversationHistory })
        })
        .then(() => {
          addBubble("✅ 保存完了。セッションを終了します。", 'system');
          conversationHistory = "";
        });
      }

      function addBubble(text, type) {
        const div = document.createElement('div'); div.className = `bubble ${type}`; div.innerHTML = text.replace(/\n/g, '<br>');
        document.getElementById('chat-area').appendChild(div);
      }
      function addLoading() {
        const id = 'loading'; const div = document.createElement('div'); div.id = id; div.className = 'bubble titan';
        div.innerHTML = '...'; document.getElementById('chat-area').appendChild(div); return id;
      }
      function removeLoading(id) { const el = document.getElementById(id); if (el) el.remove(); }
    </script>
  </body>
</html>
