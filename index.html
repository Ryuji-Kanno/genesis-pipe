<canvas id="synapse-canvas"></canvas>
<div id="aurora-overlay"></div>

<!-- Header -->
<div class="header glass">
  <div class="title">
    <img src="./Genesis_pipe_Logo.png" alt="Genesis Pipe" class="title-logo">
  </div>
  <div class="header-actions">
    <!-- 🆕 Synthesis Button -->
    <button id="synthesis-trigger" onclick="toggleSynthesisMenu()">
      <span class="material-icons" style="color: var(--gold-400); font-size: 28px;">auto_awesome</span>
    </button>
    <div id="toggle-wrap">
      <div class="switch-container">
        <span id="mode-label">記録</span>
        <div id="switch-border">
          <label class="switch">
            <input type="checkbox" id="ai-toggle" onchange="toggleMode()">
            <span class="slider"></span>
          </label>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- Chat -->
<div id="chat-area">
  <div class="bubble system">叡智の記録を開始します。王よ、言葉を刻んでください。</div>
</div>

<audio id="bgm-audio" src="./AI_PARTNER_SYNC_BGM.m4a" loop></audio>

<!-- Footer -->
<div class="footer glass">
  <div class="save-row">
    <div id="bgm-control">
      <button id="bgm-toggle" onclick="toggleBgm()"><span class="material-icons" id="bgm-icon">volume_off</span></button>
      <button onclick="document.getElementById('bgm-slider').classList.toggle('open')" style="background:none;border:none;color:gray;font-size:10px;">▲</button>
      <input type="range" id="bgm-slider" min="0" max="100" value="8" oninput="document.getElementById('bgm-audio').volume = this.value/100">
    </div>
    <div id="save-area">
      <button id="save-btn" onclick="saveConversation()">
        <span class="material-icons" style="font-size:18px;">save</span>
        保存して終了
      </button>
    </div>
  </div>
  <div class="input-row">
    <button id="mic-btn" class="icon-btn" onclick="toggleRecording()"><span class="material-icons">mic</span></button>
    <textarea id="text-input" rows="1" placeholder="思考を入力…"></textarea>
    <button id="send-btn" class="icon-btn" onclick="handleSend()"><span class="material-icons">send</span></button>
  </div>
</div>

<!-- 🆕 Synthesis Panel -->
<div id="synthesis-overlay" class="glass">
  <div class="synthesis-header">
    <span>叡智の蒸留 (Synthesis)</span>
    <button onclick="toggleSynthesisMenu()" style="background:none;border:none;color:white;"><span class="material-icons">close</span></button>
  </div>
  <div class="synthesis-grid">
    <div class="syn-card" onclick="openDatePick('Daily')"><span class="material-icons">today</span><b>今日のまとめ</b><small>本日のログを蒸留</small></div>
    <div class="syn-card" onclick="openDatePick('Weekly')"><span class="material-icons">date_range</span><b>週のまとめ</b><small>直近7日間を俯瞰</small></div>
    <div class="syn-card" onclick="openDatePick('Monthly')"><span class="material-icons">calendar_view_month</span><b>月のまとめ</b><small>月次サマリー</small></div>
    <div class="syn-card" onclick="openDatePick('Yearly')"><span class="material-icons">auto_stories</span><b>年のまとめ</b><small>年次に昇華</small></div>
  </div>
</div>

<!-- Hidden native pickers -->
<input type="date" id="hidden-date" style="display:none;" onchange="executeSynthesis('date')">
<input type="month" id="hidden-month" style="display:none;" onchange="executeSynthesis('month')">

<script>
  /* ════ 基本設定 ════ */
  const WEB_APP_URL = "https://script.google.com/macros/s/AKfycby4ZsCuKOE76ZCQpr90V-UYZlsRUX-YbM9Sk_auWuIEl7u8Q00RsRvTReRLnV1Db41n/exec";
  let conversationHistory = "";
  let currentSynType = '';

  /* ════ 1. 蒸留(Synthesis)ロジック ════ */
  function toggleSynthesisMenu() { document.getElementById('synthesis-overlay').classList.toggle('open'); }
  
  function openDatePick(type) {
    currentSynType = type;
    if (type === 'Daily' || type === 'Weekly') { document.getElementById('hidden-date').showPicker(); }
    else if (type === 'Monthly') { document.getElementById('hidden-month').showPicker(); }
    else if (type === 'Yearly') {
      if(confirm(`${new Date().getFullYear()}年をまとめますか？`)) { sendToSynthesis(type, new Date().getFullYear().toString()); }
    }
  }

  function executeSynthesis(inputSource) {
    const val = (inputSource === 'date') ? document.getElementById('hidden-date').value : document.getElementById('hidden-month').value;
    if (!val) return;
    sendToSynthesis(currentSynType, val.replace(/-/g, '/'));
  }

  function sendToSynthesis(type, targetStr) {
    toggleSynthesisMenu();
    addBubble(`【${type}まとめ】リクエスト送信... (${targetStr})`, 'system');
    // GAS側の関数 runSynthesisEngine を叩く
    google.script.run
      .withSuccessHandler(() => addBubble(`✅ ${type}まとめ完了！シートを確認してくれ。`, 'titan'))
      .withFailureHandler((err) => addBubble(`⚠️ 蒸留エラー: ${err.message}`, 'system'))
      .runSynthesisEngine(type, targetStr);
  }

  /* ════ 2. 音声認識 & チャット ════ */
  const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
  const recognition = new SpeechRecognition();
  recognition.lang = 'ja-JP'; recognition.continuous = true;
  let isRecording = false;

  function toggleRecording() { isRecording ? recognition.stop() : recognition.start(); }
  recognition.onstart = () => { isRecording = true; document.getElementById('mic-btn').classList.add('recording'); };
  recognition.onend = () => { isRecording = false; document.getElementById('mic-btn').classList.remove('recording'); };
  recognition.onresult = (e) => {
    let transcript = e.results[e.results.length - 1][0].transcript;
    if (transcript.trim() === '送信') { handleSend(); return; }
    document.getElementById('text-input').value += transcript;
  };

  function handleSend() {
    const input = document.getElementById('text-input');
    const text = input.value.trim();
    if (!text) return;
    addBubble(text, 'user');
    conversationHistory += `[Rikki]: ${text}\n`;
    input.value = "";
    if (document.getElementById('ai-toggle').checked) { requestAiReply(text); }
  }

  function requestAiReply(userText) {
    saveToGas("ai_chat", userText, conversationHistory, (data) => {
      addBubble(data.reply, 'titan');
      conversationHistory += `[Titan]: ${data.reply}\n`;
    });
  }

  function saveConversation() {
    if (!conversationHistory) return;
    addBubble("アーカイブ保存中...", 'system');
    saveToGas("save", conversationHistory, null, () => {
      addBubble("✅ 保存完了。セッションをクリアしたぞ。", 'system');
      conversationHistory = "";
    });
  }

  function saveToGas(type, text, history, callback) {
    fetch(WEB_APP_URL, {
      method: "POST", mode: "no-cors",
      body: JSON.stringify({ type, fullText: text, history }),
    }).then(() => { if(callback) callback({reply: "（通信完了）"}); });
  }

  function addBubble(text, type) {
    const div = document.createElement('div');
    div.className = `bubble ${type}`;
    div.innerHTML = text.replace(/\n/g, '<br>');
    const area = document.getElementById('chat-area');
    area.appendChild(div);
    area.scrollTop = area.scrollHeight;
  }

  function toggleMode() { document.getElementById('mode-label').innerText = document.getElementById('ai-toggle').checked ? "AI対話" : "記録"; }
  function toggleBgm() {
    const audio = document.getElementById('bgm-audio');
    const icon = document.getElementById('bgm-icon');
    if (audio.paused) { audio.play(); icon.textContent = 'volume_up'; }
    else { audio.pause(); icon.textContent = 'volume_off'; }
  }

  /* ════ Background Animation (Synapse) ════ */
  (function() {
    const canvas = document.getElementById('synapse-canvas');
    const ctx = canvas.getContext('2d');
    let nodes = [];
    function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
    function init() {
      resize();
      nodes = Array.from({length: 50}, () => ({
        x: Math.random() * canvas.width, y: Math.random() * canvas.height,
        vx: (Math.random() - 0.5) * 0.5, vy: (Math.random() - 0.5) * 0.5
      }));
    }
    function draw() {
      ctx.clearRect(0,0,canvas.width,canvas.height);
      nodes.forEach(n => {
        n.x += n.vx; n.y += n.vy;
        if(n.x<0||n.x>canvas.width) n.vx*=-1; if(n.y<0||n.y>canvas.height) n.vy*=-1;
        ctx.beginPath(); ctx.arc(n.x, n.y, 1.5, 0, Math.PI*2); ctx.fillStyle = "rgba(240,192,64,0.3)"; ctx.fill();
      });
      requestAnimationFrame(draw);
    }
    init(); draw(); window.addEventListener('resize', init);
  })();
</script>
